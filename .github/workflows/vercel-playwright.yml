# Migrated from deployment_status to repository_dispatch for reliable deployment URL.
# See: https://vercel.com/docs/git/vercel-for-github#repository-dispatch-events
name: Playwright After Vercel Deploy

on:
  repository_dispatch:
    types:
      - vercel.deployment.success

concurrency:
  group: playwright-vercel-production
  cancel-in-progress: true

jobs:
  e2e:
    if: |
      github.event_name == 'repository_dispatch' &&
      (github.event.client_payload.environment == 'Production' || github.event.client_payload.environment == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment URL
        id: url
        run: |
          URL="${{ github.event.client_payload.url }}"
          if [ -z "$URL" ]; then
            # Production fallback when payload omits url
            URL="https://app.dechen.study"
            echo "::notice title=Deployment URL::Using fallback BASE_URL (payload had no url): $URL"
          fi
          # Ensure scheme
          case "$URL" in
            http://*|https://*) ;;
            *) URL="https://$URL" ;;
          esac
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "BASE_URL=$URL"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ steps.url.outputs.url }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report
          if-no-files-found: ignore
